<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Runner · Minimal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0f1c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            padding: 16px;
            touch-action: manipulation;
        }

        .game-wrapper {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #11161f;
            border-radius: 24px;
            cursor: pointer;
            touch-action: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .info {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            padding: 0 8px;
        }

        .score, .best {
            font-size: 1.3rem;
            font-weight: 600;
            background: #1e2a32;
            padding: 6px 18px;
            border-radius: 40px;
            color: #c0e0ff;
        }

        .best {
            color: #ffcf8a;
        }

        .hint {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #6c86a3;
            background: #0f1722;
            display: inline-block;
            width: auto;
            padding: 6px 16px;
            border-radius: 50px;
            letter-spacing: 0.5px;
        }

        @media (max-width: 550px) {
            .score, .best { font-size: 1rem; padding: 4px 14px; }
            .hint { font-size: 0.65rem; margin-top: 14px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="700" height="220"></canvas>
    <div class="info">
        <div class="score">🏆 <span id="scoreValue">0</span></div>
        <div class="best">⭐ <span id="bestValue">0</span></div>
    </div>
    <div class="hint">⬤  нажми / коснись — прыжок  ⬤</div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 700, H = 220;
        canvas.width = W; canvas.height = H;

        let gameRunning = true;
        let score = 0;
        let bestScore = localStorage.getItem('dinoBest') ? Math.floor(parseFloat(localStorage.getItem('dinoBest'))) : 0;
        document.getElementById('bestValue').innerText = bestScore;

        // ---- РАЗМЕРЫ ПЕРСОНАЖА (те же, что у динозавра) ----
        const CHAR_W = 28;
        const CHAR_H = 34;
        let charY = H - CHAR_H - 8;
        const CHAR_BASE = H - CHAR_H - 8;
        let isJumping = false, jumpVel = 0;
        const GRAVITY = 0.85, JUMP_POWER = -9.8;

        // Препятствия
        let obstacles = [];
        const OBS_W = 14, OBS_H = 26;
        let currentSpeed = 4.5;
        let baseSpeed = 4.5;
        let spawnCounter = 8;
        let spawnGap = 70;
        let groundOffset = 0;
        let canJumpFlag = true;

        // ---- ОТРИСОВКА НОВОГО ПЕРСОНАЖА ПО КООРДИНАТАМ ИЗ JSON ----
        // Исходные линии (масштаб от -4 до +4 по X и Y)
        const lines = [
            [[-3.94, -3.5], [-3.94, 0.5], [-3.94, 3.5]],
            [[-3.94, -3.5], [0.06, -3.5], [3.94, -3.5]],
            [[-3.94, 0.5], [-1.11, 3.33], [0.94, 4.5]],
            [[0.94, 4.5], [0.94, 0.5]],
            [[0.94, 4.5], [3.94, 4.5]],
            [[3.94, -3.5], [3.94, 0.5], [3.94, 4.5]]
        ];

        function drawCharacter(ctx, x, y, w, h) {
            // Масштабируем: исходные координаты лежат в диапазоне примерно от -4 до 4 по X и Y.
            // Центр фигуры (0,0) совместим с центром нашего прямоугольника.
            const centerX = x + w/2;
            const centerY = y + h/2;
            const scaleX = w / 8;   // 8 = размах по X от -4 до +4
            const scaleY = h / 8;   // 8 = размах по Y от -4 до +4

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.scale(scaleX, scaleY);
            ctx.beginPath();
            ctx.lineWidth = 0.2;   // толщина линии в локальных координатах (~2 пикселя)
            ctx.strokeStyle = "#8bc34a";
            ctx.fillStyle = "#8bc34a";
            
            // Рисуем каждый отрезок
            for (let poly of lines) {
                if (poly.length < 2) continue;
                ctx.beginPath();
                ctx.moveTo(poly[0][0], poly[0][1]);
                for (let i = 1; i < poly.length; i++) {
                    ctx.lineTo(poly[i][0], poly[i][1]);
                }
                ctx.stroke();
            }
            // Заполним внутренность (чтобы было похоже на силуэт) – необязательно, но добавим лёгкую заливку
            // Можно залить всю фигуру – для этого соберём все точки в один контур. Упростим: просто закрасим полупрозрачным фоном.
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = "#8bc34a";
            for (let poly of lines) {
                if (poly.length < 3) continue;
                ctx.beginPath();
                ctx.moveTo(poly[0][0], poly[0][1]);
                for (let i = 1; i < poly.length; i++) {
                    ctx.lineTo(poly[i][0], poly[i][1]);
                }
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            // Дополнительно нарисуем «глаз» для живости (маленькая точка)
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(0.94, 2.0, 0.2, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = "#1c2b0f";
            ctx.beginPath();
            ctx.arc(0.94, 2.0, 0.1, 0, 2*Math.PI);
            ctx.fill();
            
            ctx.restore();
        }

        // Анимация бега (мигание) – просто меняем масштаб или добавляем эффект
        let step = 0;
        function updateStep() {
            step = (step + 1) % 20;
        }

        // ---- ОСТАЛЬНАЯ ЛОГИКА (без изменений) ----
        function resetGame(){
            gameRunning = true;
            score = 0;
            document.getElementById('scoreValue').innerText = "0";
            currentSpeed = baseSpeed;
            obstacles = [];
            spawnCounter = 10;
            isJumping = false; jumpVel = 0;
            charY = CHAR_BASE;
            canJumpFlag = true;
        }

        function gameOver(){
            gameRunning = false;
            let currentInt = Math.floor(score);
            if(currentInt > bestScore){
                bestScore = currentInt;
                localStorage.setItem('dinoBest', bestScore);
                document.getElementById('bestValue').innerText = bestScore;
            }
        }

        function jump(){
            if(!gameRunning){
                resetGame();
                return;
            }
            if(!isJumping && canJumpFlag){
                isJumping = true;
                jumpVel = JUMP_POWER;
                canJumpFlag = false;
            }
        }

        function updateChar(){
            if(isJumping){
                charY += jumpVel;
                jumpVel += GRAVITY;
                if(charY >= CHAR_BASE){
                    charY = CHAR_BASE;
                    isJumping = false;
                    canJumpFlag = true;
                    jumpVel = 0;
                }
                if(charY < 0) charY = 0;
            }
        }

        function spawnObstacle(){
            obstacles.push({ x: W, w: OBS_W, h: OBS_H, y: H - OBS_H - 8 });
        }

        function updateObstacles(){
            for(let i=0;i<obstacles.length;i++){
                obstacles[i].x -= currentSpeed;
                if(obstacles[i].x + obstacles[i].w < 0){
                    obstacles.splice(i,1); i--;
                }
            }
            const charRect = { x: 65, y: charY, w: CHAR_W, h: CHAR_H };
            for(let obs of obstacles){
                const obsRect = { x: obs.x, y: obs.y, w: obs.w, h: obs.h };
                if(charRect.x < obsRect.x + obsRect.w &&
                    charRect.x + charRect.w > obsRect.x &&
                    charRect.y < obsRect.y + obsRect.h &&
                    charRect.y + charRect.h > obsRect.y){
                    gameOver();
                    break;
                }
            }
        }

        function updateScoreAndSpeed(){
            if(gameRunning){
                score += 0.16;
                let scoreInt = Math.floor(score);
                document.getElementById('scoreValue').innerText = scoreInt;
                if(scoreInt > bestScore){
                    bestScore = scoreInt;
                    localStorage.setItem('dinoBest', bestScore);
                    document.getElementById('bestValue').innerText = bestScore;
                }
                let speedMult = 1 + Math.floor(score / 250) * 0.18;
                if(speedMult > 2.0) speedMult = 2.0;
                currentSpeed = baseSpeed + (baseSpeed * (speedMult-1) * 0.6);
                let dynamicGap = Math.max(40, 70 - Math.floor(score/140));
                spawnGap = dynamicGap;
            }
        }

        function handleSpawning(){
            if(!gameRunning) return;
            if(spawnCounter <= 0){
                spawnObstacle();
                let extra = 12 + Math.random() * 28;
                spawnCounter = spawnGap + extra;
            } else {
                spawnCounter--;
            }
        }

        // Отрисовка окружения
        function drawBackground(){
            ctx.fillStyle = "#11161f";
            ctx.fillRect(0,0,W,H);
            ctx.fillStyle = "#2a3a4a";
            for(let i=0;i<40;i++){
                let sx = (i*137)%W;
                let sy = (i*73)%(H-40);
                ctx.fillRect(sx, sy, 1,1);
            }
        }

        function drawGround(){
            ctx.fillStyle = "#2c3a2f";
            ctx.fillRect(0, H-8, W, 8);
            ctx.fillStyle = "#638c5b";
            for(let i=0;i<12;i++){
                let x = (groundOffset + i*48) % (W+60)-30;
                if(x>0 && x<W){
                    ctx.fillRect(x, H-7, 2, 3);
                }
            }
            groundOffset = (groundOffset + currentSpeed) % 70;
            ctx.strokeStyle = "#90b87a";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, H-4);
            ctx.lineTo(W, H-4);
            ctx.stroke();
        }

        function drawObstacles(){
            for(let obs of obstacles){
                ctx.fillStyle = "#b87c4f";
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                ctx.fillStyle = "#7a4a2a";
                ctx.fillRect(obs.x+4, obs.y-6, 3,8);
                ctx.fillRect(obs.x+10, obs.y-4, 3,6);
            }
        }

        function drawGameOverlay(){
            if(!gameRunning){
                ctx.globalAlpha = 0.85;
                ctx.fillStyle = "#03070e";
                ctx.fillRect(0,0,W,H);
                ctx.globalAlpha = 1;
                ctx.fillStyle = "#ffd994";
                ctx.font = "bold 26px system-ui, monospace";
                ctx.fillText("GAME OVER", W/2-85, H/2-15);
                ctx.font = "13px monospace";
                ctx.fillStyle = "#bbccff";
                ctx.fillText("нажми / коснись", W/2-70, H/2+25);
            }
        }

        function updateGame(){
            if(gameRunning){
                updateChar();
                updateObstacles();
                updateScoreAndSpeed();
                handleSpawning();
                updateStep();
            }
        }

        function draw(){
            drawBackground();
            drawGround();
            drawObstacles();
            // Рисуем нового персонажа
            drawCharacter(ctx, 65, charY, CHAR_W, CHAR_H);
            drawGameOverlay();
        }

        function gameLoop(){
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Управление
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space' || e.code === 'ArrowUp'){
                e.preventDefault();
                jump();
            }
        });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        canvas.addEventListener('mousedown', (e) => { e.preventDefault(); jump(); });
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        resetGame();
        gameLoop();
    })();
</script>
</body>
</html>
