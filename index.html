<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dino Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0f1c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            padding: 16px;
            touch-action: manipulation;
        }

        .game-wrapper {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #11161f;
            border-radius: 24px;
            cursor: pointer;
            touch-action: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .info {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            padding: 0 8px;
        }

        .score, .best {
            font-size: 1.3rem;
            font-weight: 600;
            background: #1e2a32;
            padding: 6px 18px;
            border-radius: 40px;
            color: #c0e0ff;
            backdrop-filter: blur(4px);
        }

        .best {
            color: #ffcf8a;
        }

        .hint {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #6c86a3;
            background: #0f1722;
            display: inline-block;
            width: auto;
            padding: 6px 16px;
            border-radius: 50px;
            letter-spacing: 0.5px;
        }

        @media (max-width: 550px) {
            .score, .best { font-size: 1rem; padding: 4px 14px; }
            .hint { font-size: 0.65rem; margin-top: 14px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="700" height="220"></canvas>
    <div class="info">
        <div class="score">🏆 <span id="scoreValue">0</span></div>
        <div class="best">⭐ <span id="bestValue">0</span></div>
    </div>
    <div class="hint">⬤  нажми / коснись — прыжок  ⬤</div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 700, H = 220;
        canvas.width = W; canvas.height = H;

        let gameRunning = true;
        let score = 0;
        let bestScore = localStorage.getItem('dinoBest') ? Math.floor(parseFloat(localStorage.getItem('dinoBest'))) : 0;
        document.getElementById('bestValue').innerText = bestScore;

        // Динозавр (простой, минималистичный)
        const DINO_W = 22, DINO_H = 28;
        let dinoY = H - DINO_H - 8;
        const DINO_BASE = H - DINO_H - 8;
        let isJumping = false, jumpVel = 0;
        const GRAVITY = 0.85, JUMP_POWER = -9.8;

        // Кактусы
        let obstacles = [];
        const OBS_W = 14, OBS_H = 26;
        let currentSpeed = 4.5;
        let baseSpeed = 4.5;
        let spawnCounter = 8;
        let spawnGap = 70;
        let groundOffset = 0;
        let canJumpFlag = true;

        function resetGame(){
            gameRunning = true;
            score = 0;
            document.getElementById('scoreValue').innerText = "0";
            currentSpeed = baseSpeed;
            obstacles = [];
            spawnCounter = 10;
            isJumping = false; jumpVel = 0;
            dinoY = DINO_BASE;
            canJumpFlag = true;
        }

        function gameOver(){
            gameRunning = false;
            // обновляем рекорд, если нужно
            let currentInt = Math.floor(score);
            if(currentInt > bestScore){
                bestScore = currentInt;
                localStorage.setItem('dinoBest', bestScore);
                document.getElementById('bestValue').innerText = bestScore;
            }
        }

        function jump(){
            if(!gameRunning){
                resetGame();
                return;
            }
            if(!isJumping && canJumpFlag){
                isJumping = true;
                jumpVel = JUMP_POWER;
                canJumpFlag = false;
            }
        }

        function updateDino(){
            if(isJumping){
                dinoY += jumpVel;
                jumpVel += GRAVITY;
                if(dinoY >= DINO_BASE){
                    dinoY = DINO_BASE;
                    isJumping = false;
                    canJumpFlag = true;
                    jumpVel = 0;
                }
                if(dinoY < 0) dinoY = 0;
            }
        }

        function spawnObstacle(){
            obstacles.push({ x: W, w: OBS_W, h: OBS_H, y: H - OBS_H - 8 });
        }

        function updateObstacles(){
            for(let i=0;i<obstacles.length;i++){
                obstacles[i].x -= currentSpeed;
                if(obstacles[i].x + obstacles[i].w < 0){
                    obstacles.splice(i,1); i--;
                }
            }
            const dinoRect = { x: 65, y: dinoY, w: DINO_W, h: DINO_H };
            for(let obs of obstacles){
                const obsRect = { x: obs.x, y: obs.y, w: obs.w, h: obs.h };
                if(dinoRect.x < obsRect.x + obsRect.w &&
                    dinoRect.x + dinoRect.w > obsRect.x &&
                    dinoRect.y < obsRect.y + obsRect.h &&
                    dinoRect.y + dinoRect.h > obsRect.y){
                    gameOver();
                    break;
                }
            }
        }

        function updateScoreAndSpeed(){
            if(gameRunning){
                score += 0.16;
                let scoreInt = Math.floor(score);
                document.getElementById('scoreValue').innerText = scoreInt;
                // рекорд обновляется мгновенно
                if(scoreInt > bestScore){
                    bestScore = scoreInt;
                    localStorage.setItem('dinoBest', bestScore);
                    document.getElementById('bestValue').innerText = bestScore;
                }
                // сложность растёт плавно
                let speedMult = 1 + Math.floor(score / 250) * 0.18;
                if(speedMult > 2.0) speedMult = 2.0;
                currentSpeed = baseSpeed + (baseSpeed * (speedMult-1) * 0.6);
                let dynamicGap = Math.max(40, 70 - Math.floor(score/140));
                spawnGap = dynamicGap;
            }
        }

        function handleSpawning(){
            if(!gameRunning) return;
            if(spawnCounter <= 0){
                spawnObstacle();
                let extra = 12 + Math.random() * 28;
                spawnCounter = spawnGap + extra;
            } else {
                spawnCounter--;
            }
        }

        // ----- Отрисовка (минимализм) -----
        function drawBackground(){
            ctx.fillStyle = "#11161f";
            ctx.fillRect(0,0,W,H);
            // лёгкие точки (звёзды)
            ctx.fillStyle = "#2a3a4a";
            for(let i=0;i<40;i++){
                let sx = (i*137)%W;
                let sy = (i*73)%(H-40);
                ctx.fillRect(sx, sy, 1,1);
            }
        }

        function drawGround(){
            ctx.fillStyle = "#2c3a2f";
            ctx.fillRect(0, H-8, W, 8);
            ctx.fillStyle = "#638c5b";
            for(let i=0;i<12;i++){
                let x = (groundOffset + i*48) % (W+60)-30;
                if(x>0 && x<W){
                    ctx.fillRect(x, H-7, 2, 3);
                }
            }
            groundOffset = (groundOffset + currentSpeed) % 70;
            ctx.strokeStyle = "#90b87a";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, H-4);
            ctx.lineTo(W, H-4);
            ctx.stroke();
        }

        function drawDino(){
            ctx.fillStyle = "#8bc34a";
            ctx.fillRect(65, dinoY, DINO_W, DINO_H);
            ctx.fillStyle = "#5a8f2c";
            ctx.fillRect(65+5, dinoY+6, DINO_W-10, DINO_H-12);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(65+14, dinoY+6, 4,4);
            ctx.fillStyle = "#1c2b0f";
            ctx.fillRect(65+15, dinoY+7, 2,2);
            // шипы
            for(let i=0;i<2;i++) ctx.fillRect(65+5+i*9, dinoY-4, 3,5);
            // ноги
            let step = Math.floor(Date.now()/150)%2;
            if(!isJumping && step===0){
                ctx.fillRect(65+3, dinoY+DINO_H-5, 5,7);
                ctx.fillRect(65+DINO_W-8, dinoY+DINO_H-5, 5,7);
            } else {
                ctx.fillRect(65+3, dinoY+DINO_H-4, 5,6);
                ctx.fillRect(65+DINO_W-8, dinoY+DINO_H-4, 5,6);
            }
        }

        function drawObstacles(){
            for(let obs of obstacles){
                ctx.fillStyle = "#b87c4f";
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                ctx.fillStyle = "#7a4a2a";
                ctx.fillRect(obs.x+4, obs.y-6, 3,8);
                ctx.fillRect(obs.x+10, obs.y-4, 3,6);
            }
        }

        function drawGameOverlay(){
            if(!gameRunning){
                ctx.globalAlpha = 0.85;
                ctx.fillStyle = "#03070e";
                ctx.fillRect(0,0,W,H);
                ctx.globalAlpha = 1;
                ctx.fillStyle = "#ffd994";
                ctx.font = "bold 26px system-ui, monospace";
                ctx.fillText("GAME OVER", W/2-85, H/2-15);
                ctx.font = "13px monospace";
                ctx.fillStyle = "#bbccff";
                ctx.fillText("нажми / коснись", W/2-70, H/2+25);
            }
        }

        function updateGame(){
            if(gameRunning){
                updateDino();
                updateObstacles();
                updateScoreAndSpeed();
                handleSpawning();
            }
        }

        function draw(){
            drawBackground();
            drawGround();
            drawObstacles();
            drawDino();
            drawGameOverlay();
        }

        function gameLoop(){
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Управление
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space' || e.code === 'ArrowUp'){
                e.preventDefault();
                jump();
            }
        });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        canvas.addEventListener('mousedown', (e) => { e.preventDefault(); jump(); });
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        resetGame();
        gameLoop();
    })();
</script>
</body>
</html>
