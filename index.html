<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>

<title>Ultra Dino Runner</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
}

:root{
    --bg:#07111d;
    --panel:#0f1b29;
    --panel2:#152536;
    --text:#e9f4ff;
}

body{
    background:
        radial-gradient(circle at top,#13253b 0%,#08111d 55%,#050910 100%);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Inter,system-ui,sans-serif;
    padding:12px;
    color:white;
}

.game-shell{
    width:min(100%,900px);
}

canvas{
    width:100%;
    height:auto;
    display:block;
    border-radius:28px;
    background:
        linear-gradient(to bottom,#0e2034 0%,#091522 50%,#081019 100%);
    box-shadow:
        0 15px 45px rgba(0,0,0,.45),
        inset 0 0 60px rgba(255,255,255,.03);
    touch-action:none;
}

.ui{
    margin-top:14px;
    display:flex;
    justify-content:space-between;
    gap:12px;
}

.card{
    background:rgba(20,35,50,.7);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    color:var(--text);
    padding:10px 18px;
    border-radius:20px;
    font-weight:700;
    font-size:1rem;
    flex:1;
    text-align:center;
}

.hint{
    margin-top:14px;
    text-align:center;
    color:#8db0d2;
    font-size:.85rem;
    letter-spacing:.4px;
}

@media (max-width:650px){
    .card{
        font-size:.9rem;
        padding:9px 12px;
    }

    .hint{
        font-size:.75rem;
    }
}
</style>
</head>

<body>

<div class="game-shell">

    <canvas id="game"></canvas>

    <div class="ui">
        <div class="card">🏆 SCORE: <span id="score">0</span></div>
        <div class="card">⭐ BEST: <span id="best">0</span></div>
    </div>

    <div class="hint">
        SPACE / CLICK / TOUCH — прыжок
    </div>

</div>

<script>
(() => {

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");

const BASE_W = 900;
const BASE_H = 320;

function resizeCanvas(){
    canvas.width = BASE_W;
    canvas.height = BASE_H;
}
resizeCanvas();

let best = +localStorage.getItem("ultraDinoBest") || 0;
bestEl.textContent = best;

let gameSpeed = 6;
let gravity = 0.72;
let score = 0;
let gameOver = false;
let groundOffset = 0;
let frame = 0;

const stars = [];
const clouds = [];
const particles = [];

for(let i=0;i<120;i++){
    stars.push({
        x:Math.random()*BASE_W,
        y:Math.random()*180,
        size:Math.random()*2.2,
        alpha:0.3+Math.random()*0.7,
        twinkle:Math.random()*1000
    });
}

for(let i=0;i<5;i++){
    clouds.push({
        x:Math.random()*BASE_W,
        y:40+Math.random()*80,
        w:100+Math.random()*90,
        h:35+Math.random()*20,
        speed:.15+Math.random()*.35
    });
}

const player = {
    x:95,
    y:0,
    w:54,
    h:68,
    velY:0,
    jumping:false,
    blink:0,
    blinkTimer:0,
    legAnim:0,
    pupilOffset:0
};

player.y = BASE_H - player.h - 26;

const obstacles = [];

function reset(){
    gameSpeed = 6;
    score = 0;
    frame = 0;
    obstacles.length = 0;
    particles.length = 0;
    gameOver = false;

    player.y = BASE_H - player.h - 26;
    player.velY = 0;
    player.jumping = false;
}

function jump(){

    if(gameOver){
        reset();
        return;
    }

    if(!player.jumping){
        player.jumping = true;
        player.velY = -15;
    }
}

function spawnObstacle(){

    const size = 35 + Math.random()*30;

    obstacles.push({
        x:BASE_W + 50,
        y:BASE_H - size - 24,
        w:30 + Math.random()*18,
        h:size,
        offset:Math.random()*10
    });
}

function update(){

    frame++;

    if(gameOver) return;

    score += 0.12;

    if(Math.floor(score) > best){
        best = Math.floor(score);
        localStorage.setItem("ultraDinoBest", best);
    }

    scoreEl.textContent = Math.floor(score);
    bestEl.textContent = best;

    gameSpeed += 0.0008;

    if(frame % Math.max(55 - Math.floor(score/25), 28) === 0){
        spawnObstacle();
    }

    player.velY += gravity;
    player.y += player.velY;

    const groundY = BASE_H - player.h - 26;

    if(player.y >= groundY){
        player.y = groundY;
        player.velY = 0;
        player.jumping = false;
    }

    if(!player.jumping){
        player.legAnim += 0.28;
    }

    player.blinkTimer++;

    if(player.blinkTimer > 90 + Math.random()*120){
        player.blink = 6;
        player.blinkTimer = 0;
    }

    if(player.blink > 0){
        player.blink--;
    }

    player.pupilOffset = player.jumping ? 2 : 0;

    for(let cloud of clouds){
        cloud.x -= cloud.speed;

        if(cloud.x + cloud.w < 0){
            cloud.x = BASE_W + 40;
        }
    }

    for(let i=obstacles.length-1;i>=0;i--){

        const o = obstacles[i];
        o.x -= gameSpeed;

        if(o.x + o.w < 0){
            obstacles.splice(i,1);
            continue;
        }

        if(
            player.x + 10 < o.x + o.w &&
            player.x + player.w - 10 > o.x &&
            player.y + 8 < o.y + o.h &&
            player.y + player.h - 8 > o.y
        ){
            gameOver = true;

            for(let p=0;p<25;p++){
                particles.push({
                    x:player.x+player.w/2,
                    y:player.y+player.h/2,
                    vx:(Math.random()-0.5)*7,
                    vy:(Math.random()-0.5)*7,
                    size:2+Math.random()*4,
                    life:50
                });
            }
        }
    }

    for(let i=particles.length-1;i>=0;i--){

        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;
        p.life--;

        if(p.life <= 0){
            particles.splice(i,1);
        }
    }

    groundOffset += gameSpeed;
}

function drawBackground(){

    const sky = ctx.createLinearGradient(0,0,0,BASE_H);

    sky.addColorStop(0,"#12253d");
    sky.addColorStop(.45,"#091321");
    sky.addColorStop(1,"#05080f");

    ctx.fillStyle = sky;
    ctx.fillRect(0,0,BASE_W,BASE_H);

    // stars
    for(let s of stars){

        const pulse =
            0.6 + Math.sin((frame+s.twinkle)*0.02)*0.4;

        ctx.globalAlpha = s.alpha * pulse;

        ctx.fillStyle = "#fff";

        ctx.beginPath();
        ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
        ctx.fill();
    }

    ctx.globalAlpha = 1;

    // moon
    ctx.fillStyle = "#f3f5ff";
    ctx.beginPath();
    ctx.arc(BASE_W-120,75,32,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#d7dcef";
    ctx.beginPath();
    ctx.arc(BASE_W-110,70,28,0,Math.PI*2);
    ctx.fill();
}

function drawClouds(){

    ctx.fillStyle = "rgba(120,160,220,.14)";

    for(let c of clouds){

        ctx.beginPath();

        ctx.ellipse(c.x,c.y,c.w*.4,c.h*.45,0,0,Math.PI*2);
        ctx.ellipse(c.x+35,c.y-8,c.w*.28,c.h*.35,0,0,Math.PI*2);
        ctx.ellipse(c.x-35,c.y+4,c.w*.26,c.h*.3,0,0,Math.PI*2);

        ctx.fill();
    }
}

function drawGround(){

    // terrain
    const grad = ctx.createLinearGradient(0,BASE_H-40,0,BASE_H);

    grad.addColorStop(0,"#284c2d");
    grad.addColorStop(1,"#112314");

    ctx.fillStyle = grad;
    ctx.fillRect(0,BASE_H-30,BASE_W,30);

    // glowing line
    ctx.strokeStyle = "#74d26d";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(0,BASE_H-29);
    ctx.lineTo(BASE_W,BASE_H-29);
    ctx.stroke();

    // grass
    for(let i=0;i<80;i++){

        const x = (i*20 - (groundOffset*1.4)%20);

        const h = 4 + Math.sin(i+frame*0.04)*3;

        ctx.strokeStyle = "#6fd26c";

        ctx.beginPath();
        ctx.moveTo(x,BASE_H-30);
        ctx.lineTo(x+1,BASE_H-30-h);
        ctx.stroke();
    }
}

function drawPlayer(){

    const x = player.x;
    const y = player.y;

    // shadow
    ctx.fillStyle = "rgba(0,0,0,.25)";
    ctx.beginPath();
    ctx.ellipse(
        x+player.w/2,
        BASE_H-15,
        28,
        7,
        0,
        0,
        Math.PI*2
    );
    ctx.fill();

    // body gradient
    const bodyGrad = ctx.createLinearGradient(x,y,x,y+player.h);

    bodyGrad.addColorStop(0,"#8dff84");
    bodyGrad.addColorStop(.5,"#53d15f");
    bodyGrad.addColorStop(1,"#2f9f47");

    ctx.fillStyle = bodyGrad;

    ctx.beginPath();

    ctx.roundRect(x,y,player.w,player.h,14);

    ctx.fill();

    // belly
    ctx.fillStyle = "rgba(255,255,255,.12)";
    ctx.fillRect(x+10,y+12,player.w-20,player.h-22);

    // spikes
    for(let i=0;i<5;i++){

        ctx.fillStyle = "#b7ff94";

        ctx.beginPath();

        ctx.moveTo(x+7+i*9,y+4);
        ctx.lineTo(x+12+i*9,y-10);
        ctx.lineTo(x+17+i*9,y+4);

        ctx.fill();
    }

    // tail
    ctx.fillStyle = "#3fb153";

    ctx.beginPath();
    ctx.moveTo(x-8,y+40);
    ctx.lineTo(x-18,y+32);
    ctx.lineTo(x-8,y+28);
    ctx.fill();

    // eye
    ctx.fillStyle = "#fff";

    if(player.blink > 0){
        ctx.fillRect(x+35,y+16,11,2);
    }else{

        ctx.beginPath();
        ctx.arc(x+40,y+19,6,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "#000";

        ctx.beginPath();
        ctx.arc(
            x+41+player.pupilOffset,
            y+20,
            2.5,
            0,
            Math.PI*2
        );
        ctx.fill();
    }

    // mouth
    ctx.strokeStyle = "#174e1d";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(x+34,y+34);
    ctx.lineTo(x+46,y+34);
    ctx.stroke();

    // animated legs
    const legMove = Math.sin(player.legAnim)*6;

    ctx.fillStyle = "#237f36";

    if(player.jumping){

        ctx.fillRect(x+8,y+player.h-4,10,10);
        ctx.fillRect(x+34,y+player.h-4,10,10);

    }else{

        ctx.fillRect(x+8,y+player.h-2,10,14+legMove);
        ctx.fillRect(x+34,y+player.h-2,10,14-legMove);
    }
}

function drawObstacles(){

    for(let o of obstacles){

        // cactus gradient
        const grad = ctx.createLinearGradient(
            o.x,
            o.y,
            o.x,
            o.y+o.h
        );

        grad.addColorStop(0,"#5eff7e");
        grad.addColorStop(.5,"#30c95d");
        grad.addColorStop(1,"#17803f");

        ctx.fillStyle = grad;

        ctx.beginPath();
        ctx.roundRect(o.x,o.y,o.w,o.h,12);
        ctx.fill();

        // branches
        ctx.fillRect(o.x-10,o.y+25,12,10);
        ctx.fillRect(o.x+o.w-2,o.y+12,10,14);

        // glow
        ctx.shadowBlur = 15;
        ctx.shadowColor = "rgba(74,255,137,.4)";

        ctx.fillRect(o.x+5,o.y+5,2,o.h-10);

        ctx.shadowBlur = 0;

        // spikes
        ctx.strokeStyle = "#d7ffd9";

        for(let i=0;i<12;i++){

            const sy = o.y + i*(o.h/12);

            ctx.beginPath();
            ctx.moveTo(o.x+4,sy);
            ctx.lineTo(o.x-3,sy+2);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(o.x+o.w-4,sy+2);
            ctx.lineTo(o.x+o.w+4,sy);
            ctx.stroke();
        }
    }
}

function drawParticles(){

    for(let p of particles){

        ctx.globalAlpha = p.life/50;

        ctx.fillStyle = "#8cff7a";

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    }

    ctx.globalAlpha = 1;
}

function drawOverlay(){

    if(!gameOver) return;

    ctx.fillStyle = "rgba(0,0,0,.5)";
    ctx.fillRect(0,0,BASE_W,BASE_H);

    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";

    ctx.font = "bold 48px system-ui";
    ctx.fillText("GAME OVER",BASE_W/2,120);

    ctx.font = "24px system-ui";
    ctx.fillStyle = "#9dd2ff";

    ctx.fillText(
        "Нажми чтобы начать снова",
        BASE_W/2,
        170
    );
}

function render(){

    drawBackground();
    drawClouds();
    drawGround();
    drawObstacles();
    drawPlayer();
    drawParticles();
    drawOverlay();
}

function loop(){

    update();
    render();

    requestAnimationFrame(loop);
}

window.addEventListener("keydown",(e)=>{

    if(e.code === "Space" || e.code === "ArrowUp"){
        e.preventDefault();
        jump();
    }
});

canvas.addEventListener("mousedown",(e)=>{
    e.preventDefault();
    jump();
});

canvas.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    jump();
},{passive:false});

canvas.addEventListener("contextmenu",(e)=>{
    e.preventDefault();
});

reset();
loop();

})();
</script>

</body>
</html>
